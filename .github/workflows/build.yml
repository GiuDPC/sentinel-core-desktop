# ──────────────────────────────────────────────
# Sentinel Core Desktop — Build & Release
# Plataformas: Windows x64, Linux x64
# Tauri v2 + Vite + Rust
# ──────────────────────────────────────────────

name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # ─── Perfil rápido para CI (sin LTO completo para evitar OOM/timeout) ───
  CARGO_PROFILE_RELEASE_LTO: thin
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 16
  CARGO_PROFILE_RELEASE_STRIP: symbols
  CARGO_PROFILE_RELEASE_OPT_LEVEL: s
  # ─── Usar el sparse protocol para resolver crates.io más rápido ───
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  # ════════════════════════════════════════════
  # CHECK: Verificación rápida (ESLint + cargo check)
  # ════════════════════════════════════════════
  check:
    name: Check (lint + compile)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true
          cache-all-crates: true

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Frontend lint
        working-directory: frontend
        run: npx eslint src/

      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Rust compile check
        working-directory: src-tauri
        run: cargo check --release

  # ════════════════════════════════════════════
  # BUILD WINDOWS x64
  # ════════════════════════════════════════════
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    needs: [check]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true
          # Guarda cache incluso si falla para no recompilar todo en el próximo intento
          cache-all-crates: true

      - name: Free up disk space
        shell: pwsh
        run: |
          # Limpiar carpetas temporales de runner para hacer espacio
          Remove-Item -Recurse -Force "$env:USERPROFILE\.npm\_cacache" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$env:LOCALAPPDATA\Temp\*" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$env:windir\Temp\*" -ErrorAction SilentlyContinue
          # Limpiar el cache de pip/Chocolatey que no usamos
          Remove-Item -Recurse -Force "C:\ProgramData\chocolatey\lib" -ErrorAction SilentlyContinue

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build Tauri app (release)
        working-directory: src-tauri
        shell: pwsh
        # cargo tauri build ejecuta beforeBuildCommand (frontend build) automáticamente
        run: |
          cargo tauri build --verbose 2>&1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installers (MSI + NSIS)
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-core-windows-x64
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          compression-level: 0

  # ════════════════════════════════════════════
  # BUILD LINUX x64 (deb + AppImage)
  # ════════════════════════════════════════════
  build-linux:
    name: Build Linux (x64)
    runs-on: ubuntu-22.04
    needs: [check]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true
          cache-all-crates: true

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            libfuse2 \
            file

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build Tauri app (release)
        working-directory: src-tauri
        # cargo tauri build ejecuta beforeBuildCommand (frontend build) automáticamente
        run: |
          cargo tauri build --verbose 2>&1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installers (deb + AppImage)
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-core-linux-x64
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          compression-level: 0
