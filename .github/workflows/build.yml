# ──────────────────────────────────────────────
# Sentinel Core Desktop — Build & Release
# Plataformas: Windows x64, Linux x64
# Tauri v2 + Vite + Rust
# ──────────────────────────────────────────────

name: Build & Release

on:
  push:
    branches:
      - main
      - app-desktop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Evita builds duplicados en pushes rápidos al mismo branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── LINT: ESLint + Rust clippy ───
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npx eslint src/ --max-warnings=0 2>&1 || echo "ESLint found warnings (non-fatal)"

      - name: Clippy (deny warnings)
        working-directory: src-tauri
        run: cargo clippy -- -D warnings 2>&1 || echo "Clippy warnings (non-fatal)"

  # ─── BUILD: Windows x64 ───
  build-windows:
    name: 'Build Windows (x64)'
    runs-on: windows-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build (cargo tauri build)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./src-tauri
          tagName: v__VERSION__
          releaseName: 'Sentinel Core v__VERSION__'
          releaseBody: |
            ## Sentinel Core Desktop — v__VERSION__

            ### Instalación
            - **Windows**: Descargar el `.msi` o `.exe` (NSIS) de la sección Assets abajo.
            - **Linux**: Descargar el `.deb` o `.AppImage`.

            ### Requisitos Mínimos
            - **Windows 10 1809+** (WebView2 runtime se instala automáticamente)
            - **Linux**: Cualquier distro con soporte para AppImage o .deb

            ### Novedades de esta versión
            *(completar con changelog)*
          releaseDraft: true
          prerelease: false
          args: ''

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-core-windows-x64
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  # ─── BUILD: Linux x64 ───
  build-linux:
    name: 'Build Linux (x64)'
    runs-on: ubuntu-22.04
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            libfuse2 \
            file

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build (cargo tauri build)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./src-tauri
          tagName: v__VERSION__
          releaseName: 'Sentinel Core v__VERSION__'
          releaseBody: |
            ## Sentinel Core Desktop — v__VERSION__

            ### Instalación
            - **Windows**: Descargar el `.msi` o `.exe` (NSIS) de la sección Assets abajo.
            - **Linux**: Descargar el `.deb` o `.AppImage`.

            ### CachyOS / Arch Linux
            Descargar el `.AppImage`, dar permisos de ejecución y ejecutar:
            ```bash
            chmod +x Sentinel-Core_*.AppImage
            ./Sentinel-Core_*.AppImage
            ```
            *(requiere `fuse2` instalado: `sudo pacman -S fuse2`)*

            ### Requisitos Mínimos
            - **Windows 10 1809+** (WebView2 runtime se instala automáticamente)
            - **Linux**: Cualquier distro con soporte para AppImage (.deb recomendado para Ubuntu/Debian)

            ### Novedades de esta versión
            *(completar con changelog)*
          releaseDraft: true
          prerelease: false
          args: ''

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-core-linux-x64
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
